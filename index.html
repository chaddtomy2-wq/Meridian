// ─── DATE UTILS ───────────────────────────────────────────────────────────────
// 4am logical day boundary
function getLogicalDate(dayBoundaryHour = 0) {
  const now = new Date(new Date().toLocaleString("en-US", { timeZone: "America/Toronto" }));
  if (now.getHours() < dayBoundaryHour) {
    now.setDate(now.getDate() - 1);
  }
  const y = now.getFullYear();
  const m = String(now.getMonth() + 1).padStart(2, "0");
  const d = String(now.getDate()).padStart(2, "0");
  return `${y}-${m}-${d}`;
}

function dateStr(offset = 0) {
  const d = new Date();
  d.setDate(d.getDate() + offset);
  return d.toISOString().slice(0, 10);
}

function localDateStr(d) {
  const dt = new Date((d || new Date()).toLocaleString("en-US", { timeZone: "America/Toronto" }));
  const y = dt.getFullYear();
  const m = String(dt.getMonth() + 1).padStart(2, "0");
  const day = String(dt.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}

function formatTimeLabel(mins) {
  const h = Math.floor(mins / 60), m = mins % 60;
  const ap = h >= 12 ? "PM" : "AM", h12 = h % 12 || 12;
  return `${h12}${m ? `:${m.toString().padStart(2,"0")}` : ""} ${ap}`;
}

function formatMinsDur(mins) {
  if (mins < 60) return `${mins}m`;
  const h = Math.floor(mins/60), m = mins%60;
  return m ? `${h}h ${m}m` : `${h}h`;
}

// ─── MODAL ────────────────────────────────────────────────────────────────────
function Modal({ title, onClose, children }) {
  return (
    <div style={{
      position:"fixed", inset:0, zIndex:1000,
      background:"rgba(0,0,0,0.7)", backdropFilter:"blur(6px)",
      display:"flex", alignItems:"flex-end", justifyContent:"center",
    }} onClick={onClose}>
      <div className="si" onClick={e => e.stopPropagation()} style={{
        width:390, maxHeight:"82vh", overflowY:"auto",
        background:"#10102a", border:`1px solid ${BORDER2}`,
        borderRadius:"20px 20px 0 0", padding:"20px 20px 40px",
      }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:20 }}>
          <div style={{ fontFamily:"'Playfair Display',serif", fontSize:20, fontWeight:700 }}>{title}</div>
          <button onClick={onClose} style={{ background:"none", border:"none", color:TEXT2, fontSize:20, lineHeight:1 }}>×</button>
        </div>
        {children}
      </div>
    </div>
  );
}

// ─── SPEECH TO TEXT ───────────────────────────────────────────────────────────
function useSpeechToText(onResult) {
  const [listening, setListening] = useState(false);
  const [available, setAvailable] = useState(false);
  const recRef = useRef(null);

  useEffect(() => {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    setAvailable(!!SpeechRecognition);
  }, []);

  const toggle = useCallback(() => {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) return;
    if (listening) {
      recRef.current?.stop();
      setListening(false);
      return;
    }
    const rec = new SpeechRecognition();
    rec.continuous = true;
    rec.interimResults = false;
    rec.lang = "en-US";
    rec.onresult = e => {
      const transcript = Array.from(e.results).map(r => r[0].transcript).join(" ");
      onResult(transcript);
    };
    rec.onerror = () => { setListening(false); };
    rec.onend = () => { setListening(false); };
    rec.start();
    recRef.current = rec;
    setListening(true);
  }, [listening, onResult]);

  return { listening, available, toggle };
}

// TAB: THE CHAIN
// ═══════════════════════════════════════════════════════════════════════════════
function TabChain({ dayData, stars }) {
  const [particles, setParticles] = useState([]);
  const [tick, setTick] = useState(0);
  const pidRef = useRef(0);
  const logicalToday = getLogicalDate(1);

  // Streak = count of days THIS MONTH where both dawn and dusk are full
  function calcStreak(data) {
    const now = new Date();
    const thisMonth = now.toISOString().slice(0,7);
    return Object.keys(data).filter(k => k.startsWith(thisMonth) && data[k].dawn === "full" && data[k].dusk === "full").length;
  }

  const streak = calcStreak(dayData);

  // Ring fill = days elapsed this month / days in month
  const now = new Date();
  const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
  const dayOfMonth = now.getDate();
  const monthPct = dayOfMonth / daysInMonth;
  const monthName = now.toLocaleDateString("en-US", { month:"long", year:"numeric" });

  // Ring geometry
  const R = 130, cx = 195, cy = 210;
  const circ = 2 * Math.PI * R;
  const offset = circ * (1 - monthPct);

  // Ember particle system — tip of the arc
  useEffect(() => {
    const t = setInterval(() => {
      setTick(x => x + 1);
      setParticles(prev => {
        const tipAngle = (-90 + monthPct * 360) * Math.PI / 180;
        const aged = prev
          .map(p => ({ ...p, y: p.y - p.vy, x: p.x + p.vx, life: p.life - 1, opacity: p.life / p.maxLife }))
          .filter(p => p.life > 0);
        if (Math.random() < 0.6) {
          aged.push({
            id: pidRef.current++,
            x: cx + R * Math.cos(tipAngle) + (Math.random() - 0.5) * 10,
            y: cy + R * Math.sin(tipAngle) + (Math.random() - 0.5) * 10,
            vx: (Math.random() - 0.5) * 0.4,
            vy: 0.4 + Math.random() * 0.7,
            size: 0.8 + Math.random() * 1.8,
            life: 8 + Math.floor(Math.random() * 8),
            maxLife: 16,
            opacity: 1,
            color: Math.random() > 0.45 ? "#FFAA00" : "#FF5500",
          });
        }
        return aged.slice(-30);
      });
    }, 40);
    return () => clearInterval(t);
  }, [monthPct]);

  const glowPulse = 0.8 + 0.2 * Math.sin(tick * 0.12);

  return (
    <TabWrap>
      {/* Deep heat ambient */}
      <div style={{ position:"absolute", top:60, left:"50%", transform:"translateX(-50%)", width:320, height:320, borderRadius:"50%", background:`radial-gradient(circle, rgba(255,80,0,${0.07 * glowPulse}) 0%, transparent 65%)`, pointerEvents:"none", zIndex:0 }} />

      <div style={{ position:"relative", zIndex:1, display:"flex", flexDirection:"column", alignItems:"center", paddingTop:40 }}>

        <svg width={390} height={420} style={{ display:"block", overflow:"visible" }}>
          <defs>
            <linearGradient id="emberGrad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%"   stopColor="#3A0A00" />
              <stop offset="20%"  stopColor="#8B1A00" />
              <stop offset="45%"  stopColor="#CC3300" />
              <stop offset="68%"  stopColor="#FF6600" />
              <stop offset="85%"  stopColor="#FF9900" />
              <stop offset="95%"  stopColor="#FFCC00" />
              <stop offset="100%" stopColor="#FFFFFF" />
            </linearGradient>
          </defs>

          {/* Charcoal base track */}
          <circle cx={cx} cy={cy} r={R} fill="none" stroke="#1A0600" strokeWidth={22} />
          <circle cx={cx} cy={cy} r={R} fill="none" stroke="rgba(255,255,255,0.03)" strokeWidth={22} />

          {/* Outer heat glow */}
          <circle cx={cx} cy={cy} r={R} fill="none"
            stroke="#FF4400" strokeWidth={42}
            strokeLinecap="round"
            strokeDasharray={circ} strokeDashoffset={offset}
            transform={`rotate(-90 ${cx} ${cy})`}
            opacity={0.055 * glowPulse}
          />
          {/* Mid glow */}
          <circle cx={cx} cy={cy} r={R} fill="none"
            stroke="#FF7700" strokeWidth={28}
            strokeLinecap="round"
            strokeDasharray={circ} strokeDashoffset={offset}
            transform={`rotate(-90 ${cx} ${cy})`}
            opacity={0.09 * glowPulse}
          />

          {/* Main ember arc */}
          <circle cx={cx} cy={cy} r={R} fill="none"
            stroke="url(#emberGrad)" strokeWidth={20}
            strokeLinecap="round"
            strokeDasharray={circ} strokeDashoffset={offset}
            transform={`rotate(-90 ${cx} ${cy})`}
            style={{ filter:`drop-shadow(0 0 8px rgba(255,100,0,${glowPulse})) drop-shadow(0 0 18px rgba(255,60,0,0.5))` }}
          />

          {/* Inner bright edge */}
          <circle cx={cx} cy={cy} r={R - 9} fill="none"
            stroke="#FFDD00" strokeWidth={0.8}
            strokeLinecap="round"
            strokeDasharray={circ} strokeDashoffset={offset}
            transform={`rotate(-90 ${cx} ${cy})`}
            opacity={0.5 * glowPulse}
          />
          {/* Outer spark edge */}
          <circle cx={cx} cy={cy} r={R + 9} fill="none"
            stroke="#FF3300" strokeWidth={0.8}
            strokeLinecap="round"
            strokeDasharray={circ} strokeDashoffset={offset}
            transform={`rotate(-90 ${cx} ${cy})`}
            opacity={0.28 * glowPulse}
          />

          {/* Ember particles */}
          {particles.map(p => (
            <circle key={p.id} cx={p.x} cy={p.y} r={p.size} fill={p.color} opacity={p.opacity}
              style={{ filter:`drop-shadow(0 0 ${p.size * 2}px ${p.color})` }} />
          ))}

          {/* White-hot tip — layered depth */}


          {/* Streak number */}
          <text x={cx} y={cy - 12} textAnchor="middle" fontSize={100} fontWeight={900}
            fill="rgba(255,255,255,0.95)" fontFamily="Georgia,serif" letterSpacing={-5}
            style={{ filter:`drop-shadow(0 0 30px rgba(255,80,0,${glowPulse * 0.35}))` }}>
            {streak}
          </text>
          <text x={cx} y={cy + 26} textAnchor="middle" fontSize={11}
            fill={`rgba(255,150,50,${0.65 + 0.15 * glowPulse})`} letterSpacing={5} fontFamily="Georgia,serif">
            DAYS
          </text>
          <text x={cx} y={cy + 48} textAnchor="middle" fontSize={12}
            fill="rgba(255,255,255,0.35)" letterSpacing={2} fontFamily="Georgia,serif">
            {monthName.toUpperCase()}
          </text>

          {/* Month progress label — subtle, bottom of ring */}
          <text x={cx} y={cy + 170} textAnchor="middle" fontSize={11}
            fill="rgba(255,255,255,0.3)" letterSpacing={1} fontFamily="Georgia,serif">
            {dayOfMonth} of {daysInMonth} days
          </text>
        </svg>

      </div>
    </TabWrap>
  );
}

// Aurora keyframes injected via a style element in TabDawn render
function TabDawn({ dayData, setDayData, routine, setRoutine }) {
  const [editMode, setEditMode]       = useState(false);
  const [timerItem, setTimerItem]     = useState(null);
  const [timerSecs, setTimerSecs]     = useState(0);
  const [openPrompts, setOpenPrompts] = useState({});
  const [longPressItem, setLongPressItem] = useState(null);
  const [skyY, setSkyY]               = useState(0);   // scroll-driven sunrise
  const timerRef  = useRef(null);
  const lpRef     = useRef(null);
  const scrollRef = useRef(null);

  const logicalToday = getLogicalDate(1);
  const completed = routine.filter(r => r.done).length;
  // DEBUG
  console.log('logicalToday:', logicalToday, 'weight in dayData:', dayData[logicalToday]?.weight);
  const allDone   = completed === routine.length;

  // ── Scroll handler — drives the sunrise gradient ─────────────────────────
  const handleScroll = useCallback(() => {
    const el = scrollRef.current;
    if (!el) return;
    const pct = el.scrollTop / Math.max(1, el.scrollHeight - el.clientHeight);
    // Ease-in curve: transition happens fast at the top, slows at the bottom
    const eased = 1 - Math.pow(1 - Math.min(pct * 3, 1), 2);
    setSkyY(eased * 66);
  }, []);

  // ── Routine helpers ───────────────────────────────────────────────────────
  function toggleItem(id) {
    setRoutine(r => r.map(item => item.id === id ? { ...item, done: !item.done } : item));
  }
  function updateJournal(id, value) {
    setRoutine(r => r.map(item => item.id === id ? { ...item, value } : item));
  }
  function updatePrompt(itemId, promptId, value) {
    setRoutine(r => r.map(item =>
      item.id === itemId
        ? { ...item, prompts: item.prompts.map(p => p.id === promptId ? { ...p, value } : p) }
        : item
    ));
  }
  function startTimer(item) { setTimerItem(item); setTimerSecs(item.duration * 60); }

  // ── Timer tick ────────────────────────────────────────────────────────────
  useEffect(() => {
    if (timerItem) {
      timerRef.current = setInterval(() => {
        setTimerSecs(s => {
          if (s <= 1) {
            clearInterval(timerRef.current);
            toggleItem(timerItem.id);
            setTimerItem(null);
            return 0;
          }
          return s - 1;
        });
      }, 1000);
    }
    return () => clearInterval(timerRef.current);
  }, [timerItem]);

  // ── Chain sync ────────────────────────────────────────────────────────────
  useEffect(() => {
    if (allDone) {
      setDayData(prev => ({ ...prev, [logicalToday]: { ...(prev[logicalToday] || {}), dawn:"full" } }));
    } else if (completed > 0) {
      setDayData(prev => ({ ...prev, [logicalToday]: { ...(prev[logicalToday] || {}), dawn:"partial" } }));

        pointerEvents:"none", zIndex:1,

      <div style={{
        position:"absolute", bottom:-40, left:"50%", transform:"translateX(-50%)",
        width:300, height:200, borderRadius:"50%",
        background:"radial-gradient(circle, rgba(240,160,40,0.18) 0%, transparent 70%)",

      }} />

      {/* ── Noise overlay ── */}

        position:"absolute", inset:0, zIndex:1, pointerEvents:"none",
        backgroundImage:NOISE_URL, opacity:0.04,
      }} />

      <div
        ref={scrollRef}
        onScroll={handleScrollFull}

          flex:1, overflowY:"auto", overflowX:"hidden",

            <div style={{ display:"flex", gap:4, marginBottom:5 }}>
              {routine.map(item => (

                  flex:1, height:2, borderRadius:10,
                  background: item.done ? "#5eead4" : "rgba(255,255,255,0.08)",
                  boxShadow: item.done ? "0 0 6px rgba(45,212,191,0.4)" : "none",
                  transition:"all 0.35s ease",
                }} />
              ))}
            </div>
            <div style={{ fontSize:12, color:"rgba(204,251,241,0.6)" }}>
              {completed} of {routine.length} complete
            </div>
          </div>
        </header>

        {/* ── Routine items — Variant card layout ── */}
        <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
          {routine.map((item) => (
            <DawnCard
              key={item.id}
              item={item}
              sublabelMap={SUBLABELS}
              openPrompts={openPrompts}
              setOpenPrompts={setOpenPrompts}
              onToggle={() => toggleItem(item.id)}
              onTimerStart={() => startTimer(item)}
              onWeightChange={val => {
                setRoutine(r => r.map(i => i.id === item.id ? { ...i, value:val, done:!!val } : i));
                if (val) { const w = parseFloat(val); if (!isNaN(w)) setDayData(prev => ({ ...prev, [logicalToday]: { ...(prev[logicalToday] || {}), weight: w } })); }
              }}
              onJournalChange={v => updateJournal(item.id, v)}
              onJournalSave={() => setRoutine(r => r.map(i => i.id === item.id ? { ...i, saved:true, done:true } : i))}
              onPromptChange={(pid, v) => updatePrompt(item.id, pid, v)}
              onLPStart={() => handleLPStart(item.id)}
              onLPEnd={handleLPEnd}
              onEditItem={() => setLongPressItem(item.id)}

            />
          ))}

          {/* Add item (edit mode) */}
          {editMode && (
            <button
              onClick={() => setRoutine(r => [...r, { id:genId(), label:"New Item", type:"check", done:false }])}
              style={{
                width:"100%", padding:"18px 20px", borderRadius:16,
                background:"rgba(10,25,30,0.4)", backdropFilter:"blur(24px)",
                border:"1px dashed rgba(45,212,191,0.20)",
                color:"rgba(204,251,241,0.35)", fontSize:14,
              }}>
              + Add Item
            </button>
          )}

          {/* Scroll spacer + finish message — Variant spec */}
          <div style={{
            height:100, display:"flex", alignItems:"center", justifyContent:"center", marginTop:40,
          }}>
            <div style={{
              opacity: showFinish || allDone ? 1 : 0,
              transform: showFinish || allDone ? "translateY(0)" : "translateY(20px)",
              transition:"opacity 0.5s ease, transform 0.5s ease",
              textAlign:"center", color:"#99f6e4",
              fontSize:14, letterSpacing:"1.5px", textTransform:"uppercase",
            }}>
              The day is yours.
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}


// ── DawnCard — Variant card component (label + sublabel + duration badge + press scale) ──
function DawnCard({ item, sublabelMap, openPrompts, setOpenPrompts, onToggle, onTimerStart, onWeightChange, onJournalChange, onJournalSave, onPromptChange, onLPStart, onLPEnd, onEditItem }) {
  const [pressed, setPressed] = useState(false);

  const sublabel = typeof sublabelMap[item.type] === "function"
    ? sublabelMap[item.type](item)
    : sublabelMap[item.type];

  const hasExpandable = item.type === "journal" || item.type === "weight" || item.type === "prompts";

  return (
    <div
      onTouchStart={() => setPressed(true)}
      onTouchEnd={() => setPressed(false)}
      onMouseDown={() => setPressed(true)}
      onMouseUp={() => setPressed(false)}
      onMouseLeave={() => setPressed(false)}
      onClick={undefined}
      style={{
        position:"relative",
        background: item.done ? "rgba(20,45,55,0.6)" : "rgba(10,25,30,0.4)",
        backdropFilter:"blur(24px)", WebkitBackdropFilter:"blur(24px)",
        border:`1px solid ${item.done ? "rgba(150,255,220,0.20)" : "rgba(255,255,255,0.10)"}`,
        borderRadius:16, padding:"18px 20px",
        display:"flex", flexDirection:"column",
        transition:"all 0.3s cubic-bezier(0.25,0.8,0.25,1)",
        transform: pressed ? "scale(0.98)" : "scale(1)",
        cursor: hasExpandable ? "default" : "pointer",
        overflow:"hidden",
      }}
    >
      {/* Main row — checkbox + text group + right element */}
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", zIndex:2 }}>
        <div style={{ display:"flex", alignItems:"center", gap:16 }}>
          <div
            onTouchStart={e => { e.stopPropagation(); e.preventDefault(); onLPStart(); }}
            onTouchEnd={e => { e.stopPropagation(); e.preventDefault(); onLPEnd(); onToggle(); }}
            onMouseDown={e => { e.stopPropagation(); onLPStart(); }}
            onMouseUp={e => { e.stopPropagation(); onLPEnd(); onToggle(); }}
            onMouseLeave={e => { onLPEnd(); }}
            style={{ cursor:"pointer" }}
          >
            <DawnCheckbox checked={item.done} onToggle={() => {}} />
          </div>
          <div style={{ display:"flex", flexDirection:"column", gap:2 }}>
            <div style={{ display:"flex", alignItems:"center", gap:8 }}>
              <div style={{
                fontSize:15, fontWeight:500,
                color: item.done ? "rgba(240,253,250,0.38)" : "#f0fdfa",
                textDecoration: item.done ? "line-through" : "none",
                textDecorationColor:"rgba(94,234,212,0.3)",
                transition:"opacity 0.3s",
              }}>{item.label}</div>
              <button
                onClick={e => { e.stopPropagation(); onEditItem && onEditItem(); }}
                onMouseDown={e => { e.stopPropagation(); onLPEnd && onLPEnd(); }}
                onTouchStart={e => { e.stopPropagation(); onLPEnd && onLPEnd(); }}
                style={{
                  padding:"2px 6px", borderRadius:6, flexShrink:0,
                  background:"none", border:"1px solid rgba(255,255,255,0.08)",
                  color:"rgba(204,251,241,0.3)", fontSize:10,
                  lineHeight:1, transition:"all 0.2s",
                }}>✎</button>
            </div>
            {sublabel && (
              <div style={{
                fontSize:12, color:"rgba(204,251,241,0.6)", fontWeight:400,
                ...(item.done ? { opacity:0.4, textDecoration:"line-through", textDecorationColor:"rgba(94,234,212,0.3)" } : {}),
              }}>{sublabel}</div>
            )}
          </div>
        </div>


      </div>

      {/* Expandable content below the row */}

      {/* Weight */}
      {item.type === "weight" && (
        <div style={{ marginTop:14, display:"flex", alignItems:"center", gap:10 }}>
          <input type="number" placeholder="lbs" value={item.value}
            onClick={e => e.stopPropagation()}
            onChange={e => onWeightChange(e.target.value)}
            style={{
              width:88, padding:"7px 12px",
              background:"rgba(255,255,255,0.06)",
              border:"1px solid rgba(45,212,191,0.20)", borderRadius:10,
              color:"#f0fdfa", fontSize:14, outline:"none",
            }}
          />
          <span style={{ fontSize:12, color:"rgba(204,251,241,0.6)" }}>lbs</span>
        </div>
      )}

      {/* Journal */}
      {item.type === "journal" && (
        <div style={{ marginTop:14 }}>
          <DawnJournalBox
            value={item.value || ""}
            onChange={onJournalChange}
            onSave={onJournalSave}
            saved={!!item.saved}
          />
        </div>
      )}

      {/* Prompts */}
      {item.type === "prompts" && (
        <div style={{ marginTop:14 }}>
          {item.prompts.map(p => (
            <div key={p.id} style={{ marginBottom:8 }}>
              <div
                onClick={e => { e.stopPropagation(); setOpenPrompts(o => ({ ...o, [p.id]: !o[p.id] })); }}
                style={{ display:"flex", alignItems:"center", gap:8, padding:"5px 0", cursor:"pointer" }}>
                <div style={{
                  width:13, height:13, borderRadius:4, flexShrink:0,
                  border:`1px solid ${openPrompts[p.id] ? D_TEAL : "rgba(255,255,255,0.12)"}`,
                  background: openPrompts[p.id] ? "rgba(45,212,191,0.15)" : "none",
                  display:"flex", alignItems:"center", justifyContent:"center",
                  transition:"all 0.2s",
                }}>
                  {openPrompts[p.id] && <div style={{ width:5, height:5, background:D_TEAL, borderRadius:2 }} />}
                </div>
                <span style={{ fontSize:12, fontWeight:500, color:"rgba(204,251,241,0.6)" }}>{p.label}</span>
              </div>
              {openPrompts[p.id] && (
                <div style={{ marginTop:4 }}>
                  <DawnJournalBox value={p.value || ""} onChange={v => onPromptChange(p.id, v)} />
                </div>
              )}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// TAB: DUSK
// ═══════════════════════════════════════════════════════════════════════════════
function TabDusk({ dayData, setDayData, setTab, stars, routine, setRoutine }) {
  const [editMode, setEditMode] = useState(false);
  const [happy, setHappy]     = useState(7);
  const [anxiety, setAnxiety] = useState(4);
  const [openPrompts, setOpenPrompts] = useState({});
  const [longPressItem, setLongPressItem] = useState(null);
  const lpRef = useRef(null);

  const logicalToday = getLogicalDate(1);
  const completed = routine.filter(r => r.done).length;
  const allDone = completed === routine.length;

  function toggleItem(id) { setRoutine(r => r.map(item => item.id === id ? { ...item, done: !item.done } : item)); }
  function updateJournal(id, value) { setRoutine(r => r.map(item => item.id === id ? { ...item, value } : item)); }
  function updatePrompt(itemId, promptId, value) {
    setRoutine(r => r.map(item =>
      item.id === itemId
        ? { ...item, prompts: item.prompts.map(p => p.id === promptId ? { ...p, value } : p) }
        : item
    ));
  }

  useEffect(() => {
    // Always save mood whenever sliders change
    setDayData(prev => ({
      ...prev,
      [logicalToday]: { ...(prev[logicalToday] || {}), mood:{ happiness:happy, anxiety } }
    }));
  }, [happy, anxiety]);

  useEffect(() => {
    if (allDone) {
      setDayData(prev => ({
        ...prev,
        [logicalToday]: { ...(prev[logicalToday] || {}), dusk:"full",
          pagesRead: (() => { const p = routine.find(i => i.type === "pages"); return p && p.start && p.end ? Math.max(0, parseInt(p.end) - parseInt(p.start)) : 0; })() }
      }));
    } else if (completed > 0) {
      setDayData(prev => ({
        ...prev,
        [logicalToday]: { ...(prev[logicalToday] || {}), dusk:"partial" }
      }));
    }
  }, [allDone, completed]);

  function handleLongPressStart(id) { lpRef.current = setTimeout(() => setLongPressItem(id), 500); }
  function handleLongPressEnd() { clearTimeout(lpRef.current); }

  if (longPressItem) {
    const item = routine.find(r => r.id === longPressItem);
    if (!item) return null;
    return (
      <Modal title="Edit Item" onClose={() => setLongPressItem(null)}>
        <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
          <div>
            <Lbl>Name</Lbl>
            <input value={item.label}
              onChange={e => setRoutine(r => r.map(i => i.id === longPressItem ? { ...i, label:e.target.value } : i))}
              style={{ width:"100%", background:SURF2, border:`1px solid ${BORDER}`, borderRadius:10, padding:"10px 14px", color:TEXT, fontSize:14, outline:"none" }}
            />
          </div>
          <button onClick={() => { setRoutine(r => r.filter(i => i.id !== longPressItem)); setLongPressItem(null); }} style={{
            padding:"11px", borderRadius:10, background:"rgba(224,90,78,0.1)",
            border:"1px solid rgba(224,90,78,0.3)", color:DANGER, fontSize:13,
          }}>Remove Item</button>
          <button onClick={() => setLongPressItem(null)} style={{
            padding:"11px", borderRadius:10, background:`${DUSK}20`,
            border:`1px solid ${DUSK}40`, color:DUSK, fontSize:13,
          }}>Done</button>
        </div>
      </Modal>
    );
  }

  return (
    <TabWrap>
      <StarField stars={stars} />
      <Orbs variant="dusk" />
      <div style={{ padding:"28px 22px 0" }}>
        <div className="fu" style={{ marginBottom:24 }}>
                    <div style={{ display:"flex", alignItems:"baseline", justifyContent:"space-between", marginBottom:16 }}>
            <div style={{ fontFamily:"'Playfair Display',serif", fontSize:36, fontWeight:900, lineHeight:1, letterSpacing:"-0.01em" }}>Dusk</div>
            <button onClick={() => setEditMode(!editMode)} style={{
              padding:"5px 14px", borderRadius:100, flexShrink:0,
              background: editMode ? "rgba(106,176,224,0.15)" : "rgba(255,255,255,0.05)",
              border:`1px solid ${editMode ? "rgba(106,176,224,0.35)" : "rgba(255,255,255,0.1)"}`,
              color: editMode ? DUSK : "rgba(150,220,255,0.4)",
              fontSize:11, letterSpacing:"0.08em", transition:"all 0.2s",
            }}>{editMode ? "Done" : "Edit"}</button>
          </div>
          <SegProgress items={routine} color={DUSK} />
          {allDone && (
            <div className="fi" style={{
              marginTop:12, padding:"10px 14px", borderRadius:12,
              background:"rgba(106,176,224,0.08)", border:"1px solid rgba(106,176,224,0.2)",
              fontSize:12, color:DUSK, letterSpacing:"0.04em",
            }}>✓ Day complete. The chain holds.</div>
          )}
        </div>
        <Divider />

        {/* Routine items */}
        <div className="fu1" style={{ display:"flex", flexDirection:"column", gap:10, marginBottom:24 }}>
          {routine.map(item => (
            <div key={item.id}>
              <div className="glass" style={{
                padding:"14px 16px",
                background: item.done ? "rgba(106,176,224,0.06)" : SURFACE,
                borderColor: item.done ? "rgba(106,176,224,0.18)" : BORDER,
                transition:"all 0.25s",
              }}>
                <div style={{ display:"flex", alignItems:"flex-start", gap:14 }}>
                  <div style={{ marginTop:1 }}
                    onTouchStart={e => { e.stopPropagation(); handleLongPressStart(item.id); }}
                    onTouchEnd={e => { e.stopPropagation(); handleLongPressEnd(); }}
                    onMouseDown={e => { e.stopPropagation(); handleLongPressStart(item.id); }}
                    onMouseUp={e => { e.stopPropagation(); handleLongPressEnd(); }}
                    onMouseLeave={() => handleLongPressEnd()}
                  >
                    <Checkbox checked={item.done} onChange={() => toggleItem(item.id)} color={DUSK} />
                  </div>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:14, fontWeight:500, color: item.done ? TEXT2 : TEXT, textDecoration: item.done ? "line-through" : "none" }}>
                      {item.label}
                    </div>



                    {item.type === "pages" && (
                      <div style={{ display:"flex", gap:8, marginTop:10, alignItems:"center" }}>
                        <input type="number" placeholder="Start" value={item.start || ""}
                          onChange={e => {
                            const v = e.target.value;
                            setRoutine(r => r.map(i => i.id === item.id ? { ...i, start:v, done: !!(v && i.end) } : i));
                            if (v && item.end) {
                              const pages = Math.max(0, parseInt(item.end) - parseInt(v));
                              setDayData(prev => ({ ...prev, [logicalToday]: { ...(prev[logicalToday] || {}), pagesRead: pages } }));
                            }
                          }}
                          style={{ width:72, padding:"8px 10px", background:SURF2, border:`1px solid ${BORDER}`, borderRadius:8, color:TEXT, fontSize:13, outline:"none" }}
                        />
                        <span style={{ fontSize:11, color:TEXT2 }}>→</span>
                        <input type="number" placeholder="End" value={item.end || ""}
                          onChange={e => {
                            const v = e.target.value;
                            setRoutine(r => r.map(i => i.id === item.id ? { ...i, end:v, done: !!(i.start && v) } : i));
                            if (item.start && v) {
                              const pages = Math.max(0, parseInt(v) - parseInt(item.start));
                              setDayData(prev => ({ ...prev, [logicalToday]: { ...(prev[logicalToday] || {}), pagesRead: pages } }));
                            }
                          }}
                          style={{ width:72, padding:"8px 10px", background:SURF2, border:`1px solid ${BORDER}`, borderRadius:8, color:TEXT, fontSize:13, outline:"none" }}
                        />
                        {item.start && item.end && (
                          <span style={{ fontFamily:"'DM Mono',monospace", fontSize:13, color:DUSK }}>
                            +{Math.max(0, parseInt(item.end) - parseInt(item.start))} pages
                          </span>
                        )}
                      </div>
                    )}

                    {item.type === "journal" && (
                      <div style={{ marginTop:10 }}>
                        <JournalBox value={item.value || ""} onChange={v => updateJournal(item.id, v)} placeholder="How did today go…" color={DUSK} />
                      </div>
                    )}

                    {item.type === "prompts" && (
                      <div style={{ marginTop:10 }}>
                        {item.prompts.map(p => (
                          <div key={p.id} style={{ marginBottom:8 }}>
                            <div onClick={() => setOpenPrompts(o => ({ ...o, [p.id]: !o[p.id] }))}
                              style={{ display:"flex", alignItems:"center", gap:8, padding:"6px 0", cursor:"pointer" }}>
                              <div style={{
                                width:14, height:14, borderRadius:4, flexShrink:0,
                                border:`1px solid ${openPrompts[p.id] ? DUSK : TEXT3}`,
                                background: openPrompts[p.id] ? `${DUSK}20` : "none",
                                display:"flex", alignItems:"center", justifyContent:"center",
                                transition:"all 0.2s",
                              }}>
                                {openPrompts[p.id] && <div style={{ width:5, height:5, background:DUSK, borderRadius:2 }} />}
                              </div>
                              <span style={{ fontSize:12, fontWeight:500, color:TEXT2 }}>{p.label}</span>
                            </div>
                            {openPrompts[p.id] && (
                              <div className="fi" style={{ marginTop:4 }}>
                                <JournalBox value={p.value || ""} onChange={v => updatePrompt(item.id, p.id, v)} placeholder="Write here…" color={DUSK} />
                              </div>
                            )}
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                </div>
              </div>
            </div>
          ))}

          {editMode && (
            <button onClick={() => setRoutine(r => [...r, { id:genId(), label:"New Item", type:"check", done:false }])} style={{
              width:"100%", padding:"13px", borderRadius:14, background:SURFACE,
              border:`1px dashed ${TEXT3}`, color:TEXT2, fontSize:13,
            }}>+ Add Item</button>
          )}
        </div>

        {/* Mood check */}
        <div className="fu2 glass" style={{ padding:"16px 18px", marginBottom:24 }}>
          <Lbl>Mood Check</Lbl>
          {[["Happiness", happy, setHappy, DAWN], ["Anxiety", anxiety, setAnxiety, DANGER]].map(([label, val, setter, color]) => (
            <div key={label} style={{ marginBottom:14 }}>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:8 }}>
                <span style={{ fontSize:12, fontWeight:500, color:TEXT2 }}>{label}</span>
                <span style={{ fontFamily:"'DM Mono',monospace", fontSize:12, color }}>{val}</span>
              </div>
              <input type="range" min={1} max={10} value={val}
                onChange={e => setter(+e.target.value)}
                style={{ width:"100%", accentColor:color }}
              />
            </div>
          ))}
        </div>
      </div>
    </TabWrap>
  );
}

// CHART HELPERS
// ═══════════════════════════════════════════════════════════════════════════════
const DAY_W = 22;

function buildDays(firstDate, totalDays, dataMap) {
  const days = [];
  for (let i = 0; i < totalDays; i++) {
    const d = new Date(firstDate); d.setDate(d.getDate() + i);
    const key = d.toISOString().slice(0, 10);
    days.push({ i, key, dayNum: d.getDate(), month: d.getMonth(), year: d.getFullYear(), data: dataMap[key] || null });
  }
  return days;
}

function buildMonthBoundaries(days) {
  const bounds = [];
  days.forEach((day, i) => {
    if (i === 0 || day.dayNum === 1) {
      let endI = i;
      while (endI + 1 < days.length && days[endI+1].month === day.month && days[endI+1].year === day.year) endI++;
      bounds.push({
        i,
        lineX: DAY_W * i,
        midX:  DAY_W * i + (DAY_W * (endI - i + 1)) / 2,
        label: new Date(day.year, day.month, 1).toLocaleDateString("en-US", { month:"short", year:"2-digit" }),
        yrMo:  `${day.year}-${String(day.month+1).padStart(2,"0")}`,
      });
    }
  });
  return bounds;
}

function ChartScrollDiv({ monthBounds, setVisMonth, initScrollDay, children, style }) {
  const ref = React.useRef(null);
  const inited = React.useRef(false);
  const boundsRef = React.useRef(monthBounds);
  boundsRef.current = monthBounds;

  React.useLayoutEffect(() => {
    if (ref.current && !inited.current) {
      ref.current.scrollLeft = initScrollDay * DAY_W - ref.current.clientWidth / 2;
      inited.current = true;
    }
  }, []);

  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    function handleScroll() {
      const mid = el.scrollLeft + el.clientWidth / 2;
      const bounds = boundsRef.current;
      if (!bounds.length) return;
      const idx = Math.floor(mid / DAY_W);
      let result = bounds[0].yrMo;
      for (let i = bounds.length - 1; i >= 0; i--) {
        if (idx >= Math.round(bounds[i].lineX / DAY_W)) {
          result = bounds[i].yrMo;
          break;
        }
      }
      console.log("SCROLL mid:", mid, "idx:", idx, "result:", result, "bounds:", bounds.map(b => b.yrMo + "@" + b.lineX));
    }
    el.addEventListener("scroll", handleScroll, { passive: true });
    return () => el.removeEventListener("scroll", handleScroll);
  }, []);

  return (
    <div ref={ref} data-chartscroll="1"
      style={{ overflowX:"auto", overflowY:"hidden", WebkitOverflowScrolling:"touch", flex:1, ...style }}>
      {children}
    </div>
  );
}

  // Weight data from dayData
  const weightEntries = Object.entries(dayData)
    .filter(([, d]) => d.weight != null)
    .sort(([a], [b]) => a.localeCompare(b));

  const weights = weightEntries.map(([, d]) => d.weight);
  const minW = weights.length ? Math.min(...weights) : 170;
  const maxW = weights.length ? Math.max(...weights) : 200;

  const rideEntries = Object.entries(dayData)
    .filter(([, d]) => d.ride && d.ride.distance_km != null)
    .sort(([a], [b]) => a.localeCompare(b));

  const moodEntries = Object.entries(dayData)
    .filter(([, d]) => d.mood && d.mood.happiness != null)
    .sort(([a], [b]) => a.localeCompare(b));

  const importRef = useRef(null);
  const [lastBackupTime, setLastBackupTime] = useState(null);

  function exportData() {
    const blob = new Blob([JSON.stringify({ appName:"meridian", exportedAt:new Date().toISOString(), dayData }, null, 2)], { type:"application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = `meridian-export-${new Date().toISOString().slice(0,10)}.json`; a.click();
    setLastBackupTime(new Date().toISOString());
  }

  function importData(e) {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const parsed = JSON.parse(ev.target.result);
        if (parsed.dayData) {
          setDayData(prev => ({ ...prev, ...parsed.dayData }));
          alert("Import successful — " + Object.keys(parsed.dayData).length + " days loaded.");
        } else {
          alert("Invalid file — no dayData found.");
        }
      } catch {
        alert("Failed to parse file.");
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  }

  const daysSinceBackup = lastBackupTime ? Math.floor((Date.now() - new Date(lastBackupTime)) / 86400000) : null;
  const backupColor = daysSinceBackup == null ? TEXT2 : daysSinceBackup > 14 ? DANGER : daysSinceBackup > 7 ? DAWN : "#4eae7a";

  return (
    <TabWrap>
      <Orbs />
      <div style={{ padding:"28px 22px 0" }}>
        <PageHeader label="" title="Profile" />
        <Divider />

        {/* Monthly Summary */}
        {(() => {
          const monthMap = {};
          weightEntries.forEach(([k, d]) => {
            const mo = k.slice(0,7);
            if (!monthMap[mo]) monthMap[mo] = { weight:[], km:0, speeds:[], happy:[], anxiety:[], pages:0 };
            monthMap[mo].weight.push(d.weight);
          });
          rideEntries.forEach(([k, d]) => {
            const mo = k.slice(0,7);
            if (!monthMap[mo]) monthMap[mo] = { weight:[], km:0, speeds:[], happy:[], anxiety:[], pages:0 };
            monthMap[mo].km += d.ride.distance_km || 0;
            if (d.ride.speed_kmh) monthMap[mo].speeds.push(d.ride.speed_kmh);
          });
          Object.entries(dayData).forEach(([k, d]) => {
            const mo = k.slice(0,7);
            if (!monthMap[mo]) monthMap[mo] = { weight:[], km:0, speeds:[], happy:[], anxiety:[], pages:0 };
            // Count pages from dusk routine stored in dayData
            if (d.pagesRead) monthMap[mo].pages += d.pagesRead;

          moodEntries.forEach(([k, d]) => {

            if (!monthMap[mo]) monthMap[mo] = { weight:[], km:0, speeds:[], happy:[], anxiety:[], pages:0 };
            if (d.mood && d.mood.happiness != null) monthMap[mo].happy.push(d.mood.happiness);
            if (d.mood && d.mood.anxiety != null) monthMap[mo].anxiety.push(d.mood.anxiety);
          });
          const months = Object.keys(monthMap).sort();
          if (!months.length) return null;
          return (
            <div className="fu1 glass" style={{ padding:"14px 16px", marginBottom:14 }}>
              <Lbl>Monthly Summary</Lbl>
              <div style={{ overflowX:"auto", WebkitOverflowScrolling:"touch", marginLeft:-16, marginRight:-16, paddingLeft:16, paddingRight:16 }} data-chartscroll="1">
                <div style={{ display:"flex", gap:10, paddingBottom:4, width:"max-content" }}>
                  {months.map(mo => {
                    const d = monthMap[mo];
                    const label = new Date(mo+"-15").toLocaleDateString("en-US", { month:"short", year:"2-digit" });
                    const avgW = d.weight.length ? Math.round(d.weight.reduce((a,b)=>a+b,0)/d.weight.length*10)/10 : null;
                    const km = d.km > 0 ? Math.round(d.km*10)/10 : null;
                    const avgH = d.happy.length ? Math.round(d.happy.reduce((a,b)=>a+b,0)/d.happy.length*10)/10 : null;
                    const avgA = d.anxiety.length ? Math.round(d.anxiety.reduce((a,b)=>a+b,0)/d.anxiety.length*10)/10 : null;
                    return (
                      <div key={mo} style={{ background:"rgba(255,255,255,0.06)", border:"1px solid rgba(255,255,255,0.16)", borderRadius:10, padding:"10px 12px", minWidth:90, flexShrink:0 }}>
                        <div style={{ fontSize:9, fontWeight:700, letterSpacing:"0.12em", color:"#9090b8", marginBottom:8, textTransform:"uppercase" }}>{label}</div>
                        {avgW != null && <div style={{ fontSize:12, color:"#f0a830", fontFamily:"'DM Mono',monospace", marginBottom:3 }}>⚖ {avgW}</div>}
                        {km != null && <div style={{ fontSize:12, color:"#6ab0e0", fontFamily:"'DM Mono',monospace", marginBottom:3 }}>🚲 {km}km</div>}
                        {d.speeds.length > 0 && <div style={{ fontSize:11, color:"rgba(106,176,224,0.7)", fontFamily:"'DM Mono',monospace", marginBottom:3 }}>⚡ {Math.round(d.speeds.reduce((a,b)=>a+b,0)/d.speeds.length*10)/10}km/h</div>}
                        {d.pages > 0 && <div style={{ fontSize:11, color:"rgba(180,180,255,0.8)", fontFamily:"'DM Mono',monospace", marginBottom:2 }}>📖 {d.pages}p</div>}
                        {avgH != null && <div style={{ fontSize:11, color:"rgba(240,168,48,0.8)", fontFamily:"'DM Mono',monospace", marginBottom:2 }}>☺ {avgH}</div>}
                        {avgA != null && <div style={{ fontSize:11, color:"rgba(224,90,78,0.8)", fontFamily:"'DM Mono',monospace" }}>↑ {avgA}</div>}
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          );
        })()}

        {/* Weight Chart */}
        <WeightChart weightEntries={weightEntries} minW={minW} maxW={maxW} />

        {/* Cycling Chart */}
        <CyclingChart rideEntries={rideEntries} />

        {/* Mood Chart */}
        <MoodChart moodEntries={moodEntries} />

        {/* Monthly Calendar */}
        {(() => {
          const now = new Date();
          const calDate = new Date(now.getFullYear(), now.getMonth() + calOffset, 1);
          const year = calDate.getFullYear();
          const month = calDate.getMonth();
          const firstDay = new Date(year, month, 1).getDay();
          const daysInMonth = new Date(year, month + 1, 0).getDate();
          const logicalToday = getLogicalDate(1);
          const monthLabel = calDate.toLocaleDateString("en-US", { month:"long", year:"numeric" });
          const cells = [];
          for (let i = 0; i < firstDay; i++) cells.push(null);
          for (let d = 1; d <= daysInMonth; d++) {
            cells.push(`${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`);
          }
          function isDayComplete(dateKey) {
            const d = dayData[dateKey];
            return d && d.dawn === "full" && d.dusk === "full";
          }
          function getDots(dateKey) {
            const d = dayData[dateKey] || {};
            return { dawn: d.dawn || "none", dusk: d.dusk || "none" };
          }

            <div className="fu1 glass" style={{ padding:"16px 18px", marginBottom:14 }}>

                        {hasWeight && <button onClick={() => {

                      </div>
                    </div>

                    {/* Divider */}
                    <div style={{ height:1, background:`rgba(255,255,255,0.06)`, marginBottom:14 }} />

                    {/* Ride section */}

                            style={{ width:"100%", padding:"8px 8px", background:"rgba(255,255,255,0.06)", border:`1px solid ${BORDER2}`, borderRadius:8, color:TEXT, fontSize:13, outline:"none" }}

                        </div>
                        <div style={{ flex:1 }}>
                          <div style={{ fontSize:9, color:TEXT3, marginBottom:3 }}>TIME</div>

                            style={{ width:"100%", padding:"8px 8px", background:"rgba(255,255,255,0.06)", border:`1px solid ${BORDER2}`, borderRadius:8, color:TEXT, fontSize:13, outline:"none", fontFamily:"'DM Mono',monospace" }}
                          />
                        </div>
                        {/* Live speed */}
                        <div style={{ flex:1 }}>
                          <div style={{ fontSize:9, color:TEXT3, marginBottom:3 }}>KM/H</div>
                          <div style={{ padding:"8px 8px", background:"rgba(255,255,255,0.03)", border:`1px solid ${BORDER}`, borderRadius:8, fontSize:13, color:DUSK, fontFamily:"'DM Mono',monospace", minHeight:36, display:"flex", alignItems:"center" }}>
                            {(() => {
                              const dist = parseFloat(rideForm.distance) || 0;
                              const parts = (rideForm.time||"").split(":").map(Number);
                              const hrs = parts.length === 2 && !isNaN(parts[0]) && !isNaN(parts[1]) ? parts[0]/60 + parts[1]/3600 : 0;
                              return dist > 0 && hrs > 0 ? Math.round((dist/hrs)*10)/10 : "—";
                            })()}
                          </div>
                        </div>
                      </div>
                      <div style={{ display:"flex", gap:6 }}>
                        <button onClick={() => {
                          if (!rideForm.distance && !rideForm.time) return;
                          const dist = parseFloat(rideForm.distance) || null;
                          const timeStr = rideForm.time || null;
                          let speed_kmh = null;
                          if (dist && timeStr) {
                            const parts = timeStr.split(":").map(Number);
                            const hrs = parts.length === 2 ? parts[0]/60 + parts[1]/3600 : parts.length === 3 ? parts[0] + parts[1]/60 + parts[2]/3600 : 0;
                            if (hrs > 0) speed_kmh = Math.round((dist/hrs)*10)/10;
                          }
                          setDayData(prev => ({ ...prev, [backfillDay]: { ...(prev[backfillDay]||{}), ride:{ distance_km:dist, time:timeStr, speed_kmh } } }));
                          setRideForm({ distance:"", time:"" });
                        }} style={{ flex:1, padding:"8px", borderRadius:8, background:`${DUSK}20`, border:`1px solid ${DUSK}40`, color:DUSK, fontSize:12, cursor:"pointer" }}>
                          {hasRide ? "Update Ride" : "Save Ride"}
                        </button>
                        {hasRide && <button onClick={() => {
                          setDayData(prev => { const d = {...(prev[backfillDay]||{})}; delete d.ride; return {...prev, [backfillDay]:d}; });
                          setRideForm({ distance:"", time:"" });
                        }} style={{ padding:"8px 12px", borderRadius:8, background:"rgba(224,90,78,0.1)", border:"1px solid rgba(224,90,78,0.3)", color:DANGER, fontSize:12, cursor:"pointer" }}>Del</button>}
                      </div>
                    </div>
                  </div>

              })()}
            </div>

        })()}





        {/* Export / Import */}

// APP ROOT
// ═══════════════════════════════════════════════════════════════════════════════
function App({ dayData: propDayData, setDayData: propSetDayData } = {}) {
  const [tab, setTab]       = useState(0);
  const [_dayData, _setDayData] = useState(buildInitialDayData);
  const dayData    = propDayData    || _dayData;
  const setDayData = propSetDayData || _setDayData;

  // Reset checkboxes on new logical day, keep labels/types
  const todayKey = getLogicalDate(1);
  const [routineDay, setRoutineDay] = useState(todayKey);
  const [dawnRoutine, setDawnRoutine] = useState(() => JSON.parse(JSON.stringify(MORNING_ROUTINE_DEFAULT)));
  const [duskRoutine, setDuskRoutine] = useState(() => JSON.parse(JSON.stringify(NIGHT_ROUTINE_DEFAULT)));

  useEffect(() => {
    const interval = setInterval(() => {
      const newDay = getLogicalDate(1);
      if (newDay !== routineDay) {
        setRoutineDay(newDay);
        setDawnRoutine(r => r.map(i => ({ ...i, done:false, value: i.type === "weight" ? "" : i.value })));
        setDuskRoutine(r => r.map(i => ({ ...i, done:false, start:"", end:"", value:"" })));
      }
    }, 60000); // check every minute
    return () => clearInterval(interval);
  }, [routineDay]);
  const touchStartX = useRef(null);
  const touchStartY = useRef(null);

  const stars = useRef(Array.from({ length:45 }).map(() => ({
    w: Math.random() > 0.82 ? 2 : 1,
    x: Math.random() * 100,
    y: Math.random() * 65,
    op: Math.random() * 0.16 + 0.03,
  }))).current;

  function handleTouchStart(e) {
    // If touch started inside a horizontal scroll container, don't track for tab switch
    let el = e.target;
    while (el) {
      if (el.dataset && el.dataset.chartscroll === "1") {
        touchStartX.current = null;
        return;
      }
      el = el.parentElement;
    }
    touchStartX.current = e.touches[0].clientX;
    touchStartY.current = e.touches[0].clientY;
  }
  function handleTouchEnd(e) {
    if (touchStartX.current === null) return;
    const dx = e.changedTouches[0].clientX - touchStartX.current;
    const dy = e.changedTouches[0].clientY - touchStartY.current;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 52) {
      setTab(t => dx < 0 ? (t + 1) % 4 : (t - 1 + 4) % 4);
    }
    touchStartX.current = null; touchStartY.current = null;
  }

  const tabComponents = [
    <TabChain   dayData={dayData} stars={stars} />,
    <TabDawn    dayData={dayData} setDayData={setDayData} routine={dawnRoutine} setRoutine={setDawnRoutine} />,
    <TabDusk    dayData={dayData} setDayData={setDayData} setTab={setTab} stars={stars} routine={duskRoutine} setRoutine={setDuskRoutine} />,
    <TabProfile dayData={dayData} setDayData={setDayData} onSignOut={onSignOut} />,
  ];

  return (
    <div style={{ display:"flex", justifyContent:"center", minHeight:"100vh", background:"#000" }}>
      <GlobalStyle />
      <div
        style={{ width:390, height:"100dvh", display:"flex", flexDirection:"column", background:BG, position:"relative", overflow:"hidden" }}
        onTouchStart={handleTouchStart}
        onTouchEnd={handleTouchEnd}
      >
        {tab !== 0 && <StarField stars={stars} />}
        <div style={{ flex:1, display:"flex", flexDirection:"column", position:"relative", zIndex:1, overflow:"hidden" }}>
          {renderTab()}
        </div>
        <NavBar active={tab} setTab={setTab} />
      </div>
    </div>
  );
}


    // ─── AUTH WRAPPER ───────────────────────────────────────────────────────────
    function AuthGate() {
      const [user, setUser]     = useState(null);
      const [loading, setLoading] = useState(!IS_SANDBOX);
      const [dayData, setDayDataState] = useState(null);
      const uidRef = useRef(null);

      // Wrap setDayData to also persist to storage
      function setDayData(updater) {
        setDayDataState(prev => {
          const next = typeof updater === "function" ? updater(prev) : updater;
          // Persist changed days
          if (uidRef.current) {
            Object.keys(next).forEach(date => {
              if (!prev || JSON.stringify(prev[date]) !== JSON.stringify(next[date])) {
                saveDay(uidRef.current, date, next[date]);
              }
            });
          }
          return next;
        });
      }

      useEffect(() => {
        if (IS_SANDBOX) {
          uidRef.current = "local";
          loadAllDays("local", data => setDayDataState(data));
          setUser({ uid:"local", name:"Chadd" });
          return;
        }
        auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).then(() => {
          const unsub = auth.onAuthStateChanged(u => {
            setLoading(false);
            if (u) {
              uidRef.current = u.uid;
              setUser(u);
              const colRef = db.collection("users").doc(u.uid).collection("dayData");
              if (unsubRef.current) unsubRef.current();
              unsubRef.current = colRef.onSnapshot(snap => {
                if (snap.empty) {
                  const seedData = buildInitialDayData();
                  const batch = db.batch();
                  Object.entries(seedData).forEach(([date, data]) => {
                    batch.set(colRef.doc(date), data);
                  });
                  batch.commit();
                  setDayDataState(seedData);
                } else {
                  const data = {};
                  snap.forEach(doc => { data[doc.id] = doc.data(); });
                  setDayDataState(data);
                }
              }, err => console.error("Firestore error:", err));
            } else {
              setUser(null);
              setDayDataState(null);
              if (unsubRef.current) { unsubRef.current(); unsubRef.current = null; }
            }
          });
        });
      }, []);

      function handleSignIn() {
        const client = google.accounts.oauth2.initTokenClient({
          client_id: GOOGLE_CLIENT_ID,
          scope: "email profile",
          callback: async (resp) => {
            if (resp.error) return;
            const cred = firebase.auth.GoogleAuthProvider.credential(null, resp.access_token);
            await auth.signInWithCredential(cred);
          },
        });
        client.requestAccessToken();
      }

      function handleSignOut() {
        if (!IS_SANDBOX) auth.signOut();
        setUser(null);
        setDayDataState(null);
      }

      if (loading) return (
        <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100dvh", background:"#08081a", color:"#9090b8", fontSize:14 }}>
          Loading…
        </div>
      );

      if (!user) return (
        <div style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", height:"100dvh", background:"#08081a", gap:24 }}>
          <div style={{ fontFamily:"'Playfair Display',serif", fontSize:42, fontWeight:900, color:"#eeeeff" }}>Meridian</div>
          <div style={{ fontSize:13, color:"#9090b8" }}>Your daily operating system</div>
          <button onClick={handleSignIn} style={{
            marginTop:16, padding:"14px 32px", borderRadius:12,
            background:"rgba(240,168,48,0.12)", border:"1px solid rgba(240,168,48,0.4)",
            color:"#f0a830", fontSize:15, fontWeight:600, cursor:"pointer",
            fontFamily:"sans-serif",
          }}>Sign in with Google</button>
          <div style={{ fontSize:10, color:"#5a5a80", marginTop:8 }}>
            {IS_SANDBOX ? "Sandbox Mode" : `${APP_NAME} ${APP_VERSION} · ${BUILD_DATE}`}
          </div>
        </div>
      );

      if (!dayData) return (
        <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100dvh", background:"#08081a", color:"#9090b8", fontSize:14 }}>
          Loading your data…
        </div>
      );

      return <App dayData={dayData} setDayData={setDayData} onSignOut={handleSignOut} />;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<AuthGate />);
  </script>
</body>
</html>
